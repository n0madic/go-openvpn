# OpenVPN 2.6 server config for go-openvpn tls-auth integration tests.
#
# Identical to server.conf except:
#   - control channel protected by tls-auth (HMAC only) instead of tls-crypt
#   - key-direction 0 on the server side (client uses 1 / Inverse)
#   - listens on UDP/1196 so it can run alongside the tls-crypt server
#   - NO `auth` directive: exercises OpenVPN's SHA1 default for the
#     control-channel HMAC, matching providers that omit `auth`

mode server
tls-server
proto udp
port 1196
dev tun
dev-type tun

ca   /etc/openvpn/pki/ca.crt
cert /etc/openvpn/pki/server.crt
key  /etc/openvpn/pki/server.key
dh none                            # using ECDHE; no Diffie-Hellman params needed

tls-auth /etc/openvpn/pki/tlsauth.key 0

server 10.8.0.0 255.255.255.0
topology subnet

# NCP cipher list (client's IV_CIPHERS intersects with this):
data-ciphers AES-256-GCM:CHACHA20-POLY1305:AES-128-GCM

# Disable time-based rekey so the test controls when rekey fires:
reneg-sec 0

keepalive 10 60
verb 4
