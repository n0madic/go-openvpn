# OpenVPN 2.6 server config for go-openvpn integration tests.
#
# - UDP/1194
# - mTLS (CA, server cert, server key — clients verify CA and present client cert)
# - tls-crypt v1 (single 256-byte static key)
# - AEAD only: AES-256-GCM (default), CHACHA20-POLY1305 and AES-128-GCM also
#   advertised so NCP picks the first match with the client
# - reneg-sec 0: disable automatic rekey so test timing is deterministic;
#   tests trigger rekey explicitly via Client.Rekey()
# - topology subnet (modern default; client gets /24)

mode server
tls-server
proto udp
port 1194
dev tun
dev-type tun

ca   /etc/openvpn/pki/ca.crt
cert /etc/openvpn/pki/server.crt
key  /etc/openvpn/pki/server.key
dh none                            # using ECDHE; no Diffie-Hellman params needed

tls-crypt /etc/openvpn/pki/tlscrypt.key

server 10.8.0.0 255.255.255.0
topology subnet

# NCP cipher list (client's IV_CIPHERS intersects with this):
data-ciphers AES-256-GCM:CHACHA20-POLY1305:AES-128-GCM
auth SHA256

# Disable time-based rekey so the test controls when rekey fires:
reneg-sec 0

# Long enough to survive test gaps; the kernel still responds to ICMP echo on
# tun0 regardless of these timers.
keepalive 10 60

# Verbose logging makes diagnostics from a failed test much easier.
verb 4

# Reachability: the kernel answers ICMP echo on the server's tun IP (10.8.0.1),
# which is what our TestPingGateway sends to.
